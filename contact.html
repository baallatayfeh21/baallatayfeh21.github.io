<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Batool Malkawi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a class="nav-brand" href="index.html">Batool Malkawi</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html" class="active">Contact Me</a></li>
            </ul>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="page-header">
        <h1>Contact Me</h1>
        <p>Have a question or want to connect? Fill out the form below.</p>
    </header>

    <main class="container">
        <section class="card form-card">
            <form id="contactForm" onsubmit="return validateForm()">

                <div class="form-group">
                    <label for="fullName">Full Name <span class="required">*</span></label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="Enter your email address">
                </div>

                <div class="form-group">
                    <label for="country">Country <span class="required">*</span></label>
                    <input type="text" id="country" name="country" placeholder="Enter your country">
                </div>

                <div class="form-group">
                    <label for="comments">Comments <span class="required">*</span></label>
                    <textarea id="comments" name="comments" rows="5" placeholder="Write your message here..."></textarea>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn-submit">Submit</button>
                </div>

            </form>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2025 Batool Malkawi &mdash; Jordan University of Science and Technology</p>
    </footer>

    <script>
        function validateForm() {
            var fullName = document.getElementById("fullName").value.trim();
            var email = document.getElementById("email").value.trim();
            var country = document.getElementById("country").value.trim();
            var comments = document.getElementById("comments").value.trim();

            if (fullName === "" || email === "" || country === "" || comments === "") {
                alert("Please fill in all fields before submitting.");
                return false;
            }

            alert("Thank you, " + fullName + "! Your message has been submitted successfully.");
            document.getElementById("contactForm").reset();
            return false;
        }
    </script>

</body>
</html>
